name: weather-cache

on:
  schedule:
    - cron: '0 8 * * *'    # 10:00 CEST (lato) / 9:00 CET (zima)
    - cron: '0 12 * * *'   # 14:00 CEST (lato) / 13:00 CET (zima)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot do zapisania (morning|afternoon)'
        required: true
        default: 'morning'
        type: choice
        options: [morning, afternoon]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch and cache weather data
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            export SLOT="${{ inputs.slot }}"
          elif [ "${{ github.event.schedule }}" = "0 8 * * *" ]; then
            export SLOT="morning"
          else
            export SLOT="afternoon"
          fi
          echo "Slot: $SLOT"
          node scripts/fetch-weather.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
