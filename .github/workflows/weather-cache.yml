name: weather-cache

on:
  schedule:
    # Poza pełną godziną (GitHub deprioretyzuje crony o :00) + 2 próby na slot,
    # żeby opóźnienia/pominięcia w kolejce Actions nie zostawiały pustego slotu.
    - cron: '20 8 * * *'    # ~10:20 CEST (lato) / 9:20 CET (zima) – morning
    - cron: '45 8 * * *'    # ~10:45 CEST (lato) / 9:45 CET (zima) – morning (retry)
    - cron: '20 12 * * *'   # ~14:20 CEST (lato) / 13:20 CET (zima) – afternoon
    - cron: '45 12 * * *'   # ~14:45 CEST (lato) / 13:45 CET (zima) – afternoon (retry)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot do zapisania (morning|afternoon)'
        required: true
        default: 'morning'
        type: choice
        options: [morning, afternoon]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch and cache weather data
        run: |
          SCHED="${{ github.event.schedule }}"
          if [ -n "${{ inputs.slot }}" ]; then
            export SLOT="${{ inputs.slot }}"
          elif echo "$SCHED" | grep -q ' 8 '; then   # godzina 8 UTC = poranny slot
            export SLOT="morning"
          else
            export SLOT="afternoon"
          fi
          echo "Slot: $SLOT"
          node scripts/fetch-weather.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
