name: weather-cache

on:
  schedule:
    - cron: '15 7 * * *'   # 9:15 CEST (lato) / 8:15 CET (zima)
    - cron: '15 11 * * *'  # 13:15 CEST (lato) / 12:15 CET (zima)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch and cache weather data
        run: node scripts/fetch-weather.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
