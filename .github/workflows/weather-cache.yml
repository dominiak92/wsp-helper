name: weather-cache

on:
  schedule:
    - cron: '15 7 * * *'   # 9:15 CEST (lato) / 8:15 CET (zima)
    - cron: '15 11 * * *'  # 13:15 CEST (lato) / 12:15 CET (zima)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot do zapisania (morning|afternoon)'
        required: true
        default: 'morning'
        type: choice
        options: [morning, afternoon]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Resolve slot from schedule or manual input
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            echo "SLOT=${{ inputs.slot }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "15 7 * * *" ]; then
            echo "SLOT=morning" >> $GITHUB_ENV
          else
            echo "SLOT=afternoon" >> $GITHUB_ENV
          fi
      - name: Fetch and cache weather data
        run: node scripts/fetch-weather.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLOT: ${{ env.SLOT }}
